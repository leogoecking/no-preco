services:

  # ────────────────────────────────────────────────────────────
  # API Node.js
  # ────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/leogoecking/no-preco:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: no-preco-api
    restart: unless-stopped

    environment:
      NODE_ENV:         production
      PORT:             ${PORT:-3000}
      DATABASE_URL:     ${DATABASE_URL:?Defina DATABASE_URL no .env}
      JWT_SECRET:       ${JWT_SECRET:?Defina JWT_SECRET no .env}
      ADMIN_USER:       ${ADMIN_USER:-admin}
      ADMIN_PASSWORD:   ${ADMIN_PASSWORD:?Defina ADMIN_PASSWORD no .env}
      COLETA_ATIVO:     ${COLETA_ATIVO:-true}
      COLETA_MUNICIPIO: ${COLETA_MUNICIPIO:-Salvador}
      COLETA_CRON:      ${COLETA_CRON:-0 * * * *}

    # Porta não exposta externamente — acesso somente pelo nginx
    expose:
      - "3000"

    networks:
      - app_network

    healthcheck:
      test: wget -qO- http://localhost:3000/api/ping || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ────────────────────────────────────────────────────────────
  # Nginx — reverse proxy + frontend estático
  # ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: no-preco-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro

    depends_on:
      api:
        condition: service_healthy

    networks:
      - app_network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ────────────────────────────────────────────────────────────
# Rede interna
# ────────────────────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
