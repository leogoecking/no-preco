name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # 1. Qualidade — lint, tipos, formato, build
  # Roda em todo push e PR
  # ─────────────────────────────────────────────
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Format check
        run: npm run format:check

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # 2. Frontend — lint, tipos e build
  # Roda em todo push e PR, em paralelo com quality
  # ─────────────────────────────────────────────
  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: npm run lint --prefix frontend

      - name: Type-check
        run: cd frontend && npx tsc -b --noEmit

      - name: Build
        run: npm run build --prefix frontend

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # 3. Docker build — valida o Dockerfile
  # Roda em todo push e PR, sem publicar
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (sem push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 3. Publish — build + push para ghcr.io
  # Apenas em push para main (não em PRs)
  # ─────────────────────────────────────────────
  publish:
    name: Publish image
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Gerar tags e labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 4. Deploy — SSH no servidor de produção
  # Apenas em push para main, após publish
  #
  # Secrets necessários no repositório:
  #   SSH_HOST         — IP ou hostname do servidor
  #   SSH_USER         — usuário SSH
  #   SSH_PRIVATE_KEY  — chave privada SSH (formato PEM)
  #   SSH_PORT         — porta SSH (opcional, padrão 22)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [publish, frontend-quality]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Gerar .env local
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          COLETA_MUNICIPIO: ${{ vars.COLETA_MUNICIPIO || 'Teixeira de Freitas' }}
          COLETA_CRON: ${{ vars.COLETA_CRON || '0 * * * *' }}
          COLETA_ATIVO: ${{ vars.COLETA_ATIVO || 'true' }}
        run: |
          printf 'DATABASE_URL=%s\nDIRECT_URL=%s\nJWT_SECRET=%s\nADMIN_USER=%s\nADMIN_PASSWORD=%s\nCOLETA_MUNICIPIO=%s\nCOLETA_CRON=%s\nCOLETA_ATIVO=%s\n' \
            "$DATABASE_URL" "$DIRECT_URL" "$JWT_SECRET" "$ADMIN_USER" "$ADMIN_PASSWORD" \
            "$COLETA_MUNICIPIO" "$COLETA_CRON" "$COLETA_ATIVO" > .env.deploy

      - name: Deploy via SSH
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p "${{ secrets.SSH_PORT || 22 }}" "${{ secrets.SSH_HOST }}" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

          SSH_OPTS="-i $HOME/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }} -o StrictHostKeyChecking=no -o ConnectTimeout=15"
          TARGET="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

          echo "→ Criando diretórios no servidor"
          ssh $SSH_OPTS "$TARGET" "mkdir -p /opt/no-preco/docker /opt/no-preco/frontend/dist"

          echo "→ Copiando arquivos de infra"
          scp $SSH_OPTS docker-compose.yml "$TARGET:/opt/no-preco/docker-compose.yml"
          scp $SSH_OPTS docker/nginx.conf  "$TARGET:/opt/no-preco/docker/nginx.conf"
          scp $SSH_OPTS .env.deploy        "$TARGET:/opt/no-preco/.env"

          echo "→ Copiando frontend dist"
          scp -r $SSH_OPTS frontend/dist/. "$TARGET:/opt/no-preco/frontend/dist/"

          echo "→ Reiniciando serviços"
          ssh $SSH_OPTS "$TARGET" \
            'set -e
             cd /opt/no-preco
             docker compose pull api
             docker compose up -d --no-deps --wait api nginx
             docker image prune -f
             echo "Deploy concluído"'
